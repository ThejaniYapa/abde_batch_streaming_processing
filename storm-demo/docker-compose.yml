services:
  # ---------------------------------------------------------------------------
  # Coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: zookeeper:3.8
    container_name: storm-zookeeper
    restart: always
    networks:
      - storm

  # ---------------------------------------------------------------------------
  # Storm control plane
  # ---------------------------------------------------------------------------
  nimbus:
    build:
      context: ./docker
      dockerfile: Dockerfile.storm-python
    image: storm-python:2.2.0
    container_name: storm-nimbus
    command: storm nimbus
    depends_on:
      - zookeeper
    restart: always
    ports:
      - "6627:6627"          # Nimbus Thrift (used by `sparse submit`)
    volumes:
      - ./docker/storm.yaml:/conf/storm.yaml:ro
      - nimbus-data:/data
      - nimbus-logs:/logs
    networks:
      - storm

  supervisor:
    image: storm-python:2.2.0
    container_name: storm-supervisor
    command: storm supervisor
    depends_on:
      - nimbus
      - zookeeper
    restart: always
    volumes:
      - ./docker/storm.yaml:/conf/storm.yaml:ro
      - supervisor-data:/data
      - supervisor-logs:/logs
    networks:
      - storm

  ui:
    image: storm-python:2.2.0
    container_name: storm-ui
    command: storm ui
    depends_on:
      - nimbus
    restart: always
    ports:
      - "8080:8080"          # Storm UI  ->  http://<host>:8080
    volumes:
      - ./docker/storm.yaml:/conf/storm.yaml:ro
    networks:
      - storm

  # ---------------------------------------------------------------------------
  # Topology build / submit box
  # ---------------------------------------------------------------------------
  submitter:
    build:
      context: ./docker
      dockerfile: Dockerfile.submitter
    image: storm-submitter:latest
    container_name: storm-submitter
    depends_on:
      - nimbus
      - supervisor
    volumes:
      - ./storm_wordcount:/app          # the streamparse project
      - lein-cache:/root/.m2            # cache Maven deps across runs
    networks:
      - storm

networks:
  storm:
    driver: bridge

volumes:
  nimbus-data:
  nimbus-logs:
  supervisor-data:
  supervisor-logs:
  lein-cache:
